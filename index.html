<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0"/>
    <title>神秘的寶箱</title>
    <link rel="preload" as="image" href="cakewithfire.png">
    <link rel="preload" as="image" href="blowcake.gif">

    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/zpix-pixel-font/css/zpix-pixel.css"> -->

    <style>
        @font-face {
            font-family: "Zpix";
            src: url("zpix.ttf") format("truetype");
            font-display: swap;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100vw;
            background: linear-gradient(#c9a7eb, #fbb6b6);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Zpix", monospace; /*pixelfont*/
            image-rendering: pixelated;
            overflow-x: hidden;
            overflow-y: auto;
            text-align: center;
        }

        /*Responsive window box */
        .window {
            width: 90%; /* taking up most of the screen width */
            max-width: 400px; /*but never bigger than 400px */
            background: #fff8dc;
            border: 4px solid #f2d16b;
            border-radius: 8px;
            box-shadow: 4px 4px #0003;
            padding: 1rem;
            text-align: center;
        }

        .container {
            position:relative;
            /*width: 90%;
            max-width: 400px;
            aspect-ratio: 1 / 1;*/
            font-family: "Zpix", monospace;
        }
        .container img {
            position:relative;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 1;
            transition: opacity 0.6s ease;
            cursor: pointer;
        }

        #cakeImage {
            max-width: 90%;
            height: auto;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        .fade-out {
            opacity: 0;
        }

        .fade-in {
            opacity: 1;
        }

        #caption {
            /*margin-top: 20px;*/
            /*font-size: 1.2em;*/
            font-size: 1em;
            margin: 1em auto 0;
            color: #555;
            padding: 0 1rem;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .container img:not(.hidden) {
            animation: fadeIn 0.6s ease;
        }

    </style>
</head>    
<body>
    <div class="container">
        <button id="startBtn">▶️ 開始</button>
        <div id="mainContent" style="display: none;">    
            <img id="cakeImage" src="friereninchest.png" alt="Cake Box" class="fade" />
            <p id="caption">不好!芙莉蓮被寶箱怪騙了!!快去救她!!!Σ(っ°Д°;)っ (⁠點擊寶箱救芙莉蓮)</p>
        </div>
    </div>

    <audio id="audioBefore" src="sleepyfrieren.mp3" preload="auto"></audio>
    <audio id="audioAfter" src="birthdaybgm.mp3" preload="none" loop></audio>

    <script>
        const preloadImages = ["chestmob.png", "cakewithfire.png", "blowcake.gif"];
        preloadImages.forEach(src => {
            const img = new Image();
            img.src = src;
        });
        
        const cakeImage = document.getElementById("cakeImage");
        const caption = document.getElementById("caption");

        const audioBefore = document.getElementById("audioBefore");
        const audioAfter = document.getElementById("audioAfter");
        const startBtn = document.getElementById("startBtn");
        const mainContent = document.getElementById("mainContent");
        let step = 0;

        //play bgm when page load
        startBtn.addEventListener("click", () => {
            audioBefore.play();
            startBtn.style.display = "none"; // hide button
            mainContent.style.display = "block"; // show cake & caption
        });

cakeImage.addEventListener("click", () => {

    // STEP 0
    // friereninchest.png → NEW PHOTO
    if (step === 0) {

        cakeImage.classList.remove("fade-in");
        cakeImage.classList.add("fade-out");

        const newImg = new Image();
        newImg.src = "chestmob.png";

        newImg.onload = () => {
            setTimeout(() => {
                cakeImage.src = newImg.src;

                caption.textContent =
                    "啊咧...芙莉蓮不見了欸!寶箱怪裡好像有甚麼...(點擊寶箱打倒寶箱怪)";

                cakeImage.classList.remove("fade-out");
                cakeImage.classList.add("fade-in");

                step++;
            }, 300);
        };

    // STEP 1
// CHESTMOB → TEXT ONLY
} else if (step === 1) {

    cakeImage.classList.add("hidden");

    caption.textContent =
        "嗯...這是?!! ko..ko-kore wa?!!";

    step++;


// STEP 2
// TEXT ONLY → CAKE
} else if (step === 2) {

    // bring image back
    cakeImage.classList.remove("hidden");

    // Stop first bgm and start birthday bgm
    audioBefore.pause();
    audioBefore.currentTime = 0;

    audioAfter.load();
    audioAfter.play();

    cakeImage.classList.remove("fade-in");
    cakeImage.classList.add("fade-out");

    const newImg = new Image();
    newImg.src = "cakewithfire.png";

    newImg.onload = () => {
        setTimeout(() => {

            cakeImage.src = newImg.src;

            caption.textContent =
                "老哥30歲生日快樂！！(～￣▽￣)～ (點擊蛋糕吹蠟燭)";

            cakeImage.classList.remove("fade-out");
            cakeImage.classList.add("fade-in");

            step++;
        }, 300);
    };

    // STEP 2
    // CAKE → GIF
    } else if (step === 3) {

        cakeImage.classList.remove("fade-in");
        cakeImage.classList.add("fade-out");

        const newImg = new Image();
        newImg.src = "blowcake.gif";

        newImg.onload = () => {
            setTimeout(() => {
                cakeImage.src = newImg.src;

                caption.textContent =
                    "祝你以後都平安健康,想要甚麼有甚麼(就是心想事成啦) (⁠ ^ ▽ ^ )";

                cakeImage.classList.remove("fade-out");
                cakeImage.classList.add("fade-in");

                step++;
            }, 300);
        };
    }
});

        document.addEventListener("visibilitychange", ()=>{
            if (document.hidden){
                audioBefore.pause();
                audioAfter.pause();
            } else {
                //Resume music
                if (step === 0) {
                    audioBefore.play();
                } else if (step >= 1) {
                    audioAfter.play();
                }
            }
        });
    </script>
</body>
</html>
